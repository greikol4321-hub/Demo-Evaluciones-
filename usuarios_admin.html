<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <title>Usuarios y Asignaciones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=1.3">
</head>

<body data-page="admin">
    <header>
        <h1 class="header-brand">
            <span class="logo-wrap">
                <img src="img/LOGO_MEP-removebg-preview.png" loading="lazy" alt="Logo Ministerio de Educacion Publica">
            </span>
            <span>Panel Administrador</span>
        </h1>
        <a href="#" data-logout-link class="logout-link">Cerrar sesion</a>
    </header>

    <main>
        <section class="identity-bar">
            <div class="identity-bar-inner">
                <div class="identity-bar-left">
                    <strong>Admin:</strong>
                    <span data-admin-name></span>
                    <span class="feria-badge" data-feria-tag></span>
                </div>
                <div class="identity-bar-right">
                    <label class="filter-label">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 5h20"/><path d="M6 12h12"/><path d="M9 19h6"/></svg>
                        <select data-admin-feria-filter>
                            <option value="Feria Cientifica y Tecnologica">Feria Cientifica y Tecnologica</option>
                            <option value="Feria Expotecnica">Feria Expotecnica</option>
                            <option value="Festival Estudiantil de las Artes">Festival Estudiantil de las Artes</option>
                        </select>
                    </label>
                </div>
            </div>
            <p class="filter-status" data-admin-feria-status role="alert" aria-live="polite"></p>
        </section>

        <nav class="quick-nav">
            <a class="quick-nav-link" href="Proyectos.html">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>
                Crear usuario
            </a>
            <a class="quick-nav-link" href="gestion_proyectos.html">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
                Proyectos
            </a>
            <a class="quick-nav-link active" href="usuarios_admin.html">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><path d="M16 3.128a4 4 0 0 1 0 7.744"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="9" cy="7" r="4"/></svg>
                Usuarios
            </a>
            <a class="quick-nav-link" href="resultados_admin.html">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><rect x="7" y="13" width="9" height="4" rx="1"/><rect x="7" y="5" width="12" height="4" rx="1"/></svg>
                Resultados
            </a>
        </nav>

        <section class="card">
            <div class="card-header">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><path d="M16 3.128a4 4 0 0 1 0 7.744"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="9" cy="7" r="4"/></svg>
                    Usuarios registrados
                </h2>
            </div>
            <p class="form-status" data-users-table-status role="alert" aria-live="polite"></p>
            <div class="table-wrap">
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Rol</th>
                            <th>Tipo de feria</th>
                            <th>Accion</th>
                        </tr>
                    </thead>
                    <tbody data-users-table></tbody>
                </table>
            </div>
        </section>

        <section class="card">
            <div class="card-header">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></svg>
                    Jueces registrados y asignacion de 3 proyectos
                </h2>
            </div>
            <p>Asigna hasta tres proyectos a cada juez desde esta tabla.</p>
            <p class="form-status" data-judge-assignments-status role="alert" aria-live="polite"></p>
            <div class="table-wrap">
                <table class="results-table assignments-table">
                    <thead>
                        <tr>
                            <th>Juez</th>
                            <th>Proyecto 1</th>
                            <th>Proyecto 2</th>
                            <th>Proyecto 3</th>
                            <th>Accion</th>
                        </tr>
                    </thead>
                    <tbody data-judge-assignments></tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module" src="js/main.js?v=1.4"></script>
</body>

</html>

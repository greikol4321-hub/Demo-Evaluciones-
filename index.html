<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <meta name="theme-color" content="#0d2a5b">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso a Jueces de Ferias</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body data-page="login">
    <header class="login-header">
        <div class="brand-row">
            <div class="brand-block brand-left">
                <img class="logo-image" src="img/LOGO_MEP-removebg-preview.png" alt="Logo Ministerio de Educación Pública">
                <div class="brand-copy">
                    <strong>MINISTERIO DE EDUCACION PUBLICA</strong>
                    <span>Gobierno de Costa Rica</span>
                </div>
            </div>
        </div>
    </header>

    <section class="title-section">
        <h1>Ingreso a <span class="highlight-gold">Jueces</span> de <span class="highlight-gold">Ferias</span></h1>
        <p>Ministerio de <span class="highlight-gold">Educacion Publica</span></p>
        <p>Direccion Regional de Educacion Central del Pacifico</p>
    </section>

    <main>
        <div class="login-stage">
            <div class="login-watermark" aria-hidden="true">
                <div class="watermark-ring"></div>
            </div>

            <section class="login-card">
                <form class="grid-form login-form" data-login-form>
                    <label>
                        Usuario
                        <input name="usuario" type="text" autocomplete="username" required>
                    </label>
                    <label>
                        Contraseña
                        <input name="password" type="password" autocomplete="current-password" required>
                    </label>
                    <button type="submit">INGRESAR</button>
                </form>
                <p class="form-status" data-login-status role="alert" aria-live="polite"></p>
                <p class="login-footnote">Sistema institucional de acceso por rol</p>
            </section>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
